<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>qr-hanko-maker</title>
    <meta
      name="description"
      content="URL と はんこ文字から、はんこを中央に組み込んだQRコードを生成するWebアプリ"
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe7;
        --bg-2: #efe3d5;
        --paper: rgba(255, 250, 242, 0.92);
        --paper-strong: #fffaf2;
        --ink: #1f1a17;
        --muted: #65584e;
        --accent: #b5442b;
        --accent-2: #8f2a1d;
        --line: rgba(31, 26, 23, 0.12);
        --shadow: 0 28px 90px rgba(31, 26, 23, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          radial-gradient(circle at 15% 12%, rgba(181, 68, 43, 0.09), transparent 28%),
          radial-gradient(circle at 85% 16%, rgba(31, 26, 23, 0.05), transparent 24%),
          radial-gradient(circle at 88% 84%, rgba(181, 68, 43, 0.08), transparent 24%),
          linear-gradient(180deg, var(--bg), var(--bg-2));
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px 18px 40px;
      }

      .card {
        width: min(1120px, 100%);
        border: 1px solid var(--line);
        border-radius: 30px;
        background: var(--paper);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
        overflow: clip;
      }

      .hero {
        padding: 34px 32px 24px;
        border-bottom: 1px solid var(--line);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(181, 68, 43, 0.12);
        color: var(--accent);
        font-size: 0.86rem;
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      h1 {
        margin: 16px 0 8px;
        font-family: Georgia, "Times New Roman", "Hiragino Mincho ProN", "Yu Mincho", serif;
        font-size: clamp(2.2rem, 5vw, 4.8rem);
        line-height: 0.98;
        letter-spacing: -0.05em;
      }

      .lead {
        margin: 0;
        max-width: 60ch;
        color: var(--muted);
        line-height: 1.8;
        font-size: 1.02rem;
      }

      .content {
        display: grid;
        grid-template-columns: 1.05fr 0.95fr;
      }

      .controls,
      .preview {
        padding: 28px 32px 32px;
      }

      .preview {
        border-left: 1px solid var(--line);
        background:
          radial-gradient(circle at top center, rgba(181, 68, 43, 0.07), transparent 44%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.38), rgba(181, 68, 43, 0.02));
      }

      .section-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
      }

      h2 {
        margin: 0;
        font-size: 1.02rem;
        letter-spacing: 0.02em;
      }

      .hint {
        color: var(--muted);
        font-size: 0.92rem;
      }

      .field-grid {
        display: grid;
        gap: 18px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field label {
        font-size: 0.92rem;
        font-weight: 700;
        letter-spacing: 0.03em;
      }

      .field input,
      .field select {
        width: 100%;
        border: 1px solid rgba(31, 26, 23, 0.14);
        border-radius: 16px;
        padding: 15px 16px;
        background: rgba(255, 255, 255, 0.82);
        color: var(--ink);
        font: inherit;
        outline: none;
        transition:
          border-color 0.18s ease,
          box-shadow 0.18s ease,
          transform 0.18s ease;
      }

      .field input:focus,
      .field select:focus {
        border-color: rgba(181, 68, 43, 0.52);
        box-shadow: 0 0 0 4px rgba(181, 68, 43, 0.12);
        transform: translateY(-1px);
      }

      .inline-row {
        display: grid;
        grid-template-columns: 1fr 170px 170px;
        gap: 14px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 6px;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 14px;
        padding: 13px 18px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease,
          opacity 0.18s ease,
          background 0.18s ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:active {
        transform: translateY(0);
      }

      .primary {
        color: #fff;
        background: linear-gradient(180deg, var(--accent), var(--accent-2));
        box-shadow: 0 14px 24px rgba(181, 68, 43, 0.24);
      }

      .secondary {
        color: var(--ink);
        background: rgba(31, 26, 23, 0.06);
      }

      .ghost {
        color: var(--accent);
        background: rgba(181, 68, 43, 0.1);
      }

      .meta {
        display: grid;
        gap: 6px;
        margin-top: 14px;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.7;
      }

      .status {
        min-height: 1.5em;
        font-size: 0.92rem;
        color: var(--muted);
      }

      .canvas-shell {
        display: grid;
        gap: 16px;
      }

      .preview-frame {
        aspect-ratio: 1;
        width: 100%;
        border-radius: 24px;
        border: 1px solid rgba(31, 26, 23, 0.12);
        background:
          linear-gradient(45deg, rgba(31, 26, 23, 0.04) 25%, transparent 25%, transparent 75%, rgba(31, 26, 23, 0.04) 75%),
          linear-gradient(45deg, rgba(31, 26, 23, 0.04) 25%, transparent 25%, transparent 75%, rgba(31, 26, 23, 0.04) 75%),
          #fffdf9;
        background-position:
          0 0,
          16px 16px;
        background-size: 32px 32px;
        padding: 18px;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.7);
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
        border-radius: 18px;
      }

      .footer {
        padding: 16px 32px 28px;
        color: var(--muted);
        border-top: 1px solid var(--line);
        font-size: 0.94rem;
      }

      .footer a {
        color: var(--accent);
        text-decoration: none;
      }

      .footer a:hover {
        text-decoration: underline;
      }

      .note {
        margin-top: 12px;
        padding: 14px 16px;
        border-radius: 16px;
        background: rgba(181, 68, 43, 0.08);
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.7;
      }

      @media (max-width: 920px) {
        .content {
          grid-template-columns: 1fr;
        }

        .preview {
          border-left: 0;
          border-top: 1px solid var(--line);
        }
      }

      @media (max-width: 720px) {
        .hero,
        .controls,
        .preview,
        .footer {
          padding-left: 18px;
          padding-right: 18px;
        }

        .inline-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-label="qr-hanko-maker">
        <header class="hero">
          <div class="eyebrow">QR Hanko Maker · GitHub Pages</div>
          <h1>URL と はんこ文字で、<br />はんこ入りQRコードを作る</h1>
          <p class="lead">
            URLを入れて、はんこにしたい文字を打つだけ。
            中央に朱肉っぽい印影を置いたQRコードを、その場で生成してPNGで落とせます。
          </p>
        </header>

        <div class="content">
          <section class="controls">
            <div class="section-title">
              <h2>入力</h2>
              <div class="hint">まずは最小構成で動くやつです</div>
            </div>

            <div class="field-grid">
              <div class="field">
                <label for="urlInput">URL</label>
                <input
                  id="urlInput"
                  type="text"
                  inputmode="url"
                  autocomplete="off"
                  spellcheck="false"
                  value="https://example.com"
                  placeholder="https://example.com"
                />
              </div>

              <div class="inline-row">
                <div class="field">
                  <label for="textInput">はんこ文字</label>
                  <input
                    id="textInput"
                    type="text"
                    maxlength="12"
                    autocomplete="off"
                    spellcheck="false"
                    value="高橋"
                    placeholder="高橋"
                  />
                </div>

                <div class="field">
                  <label for="shapeInput">形</label>
                  <select id="shapeInput">
                    <option value="circle">丸印</option>
                    <option value="square">角印</option>
                  </select>
                </div>

                <div class="field">
                  <label for="styleInput">サイズ感</label>
                  <select id="styleInput">
                    <option value="standard">標準</option>
                    <option value="bold">太め</option>
                    <option value="compact">小さめ</option>
                  </select>
                </div>
              </div>

              <div class="actions">
                <button class="primary" id="generateBtn" type="button">生成する</button>
                <button class="secondary" id="downloadBtn" type="button">PNGをダウンロード</button>
                <button class="ghost" id="sampleBtn" type="button">サンプルに戻す</button>
              </div>

              <div class="status" id="status" aria-live="polite"></div>
            </div>

            <div class="meta">
              <div>・中央の白い余白を確保して、QRの読み取りを壊しにくくしています。</div>
              <div>・`example.com` みたいな入力でも `https://` を自動補完します。</div>
            </div>
          </section>

          <aside class="preview">
            <div class="section-title">
              <h2>プレビュー</h2>
              <div class="hint">中央に印影を重ねた状態</div>
            </div>

            <div class="canvas-shell">
              <div class="preview-frame">
                <canvas id="preview" width="1200" height="1200"></canvas>
              </div>
              <div class="note" id="previewNote">
                ここにQRコードが出ます。スマホで読み取れるように、はんこの面積は控えめにしてあります。
              </div>
            </div>
          </aside>
        </div>

        <div class="footer">
          Issue: <a href="https://github.com/codexclaw44/qr-hanko-maker/issues/1">#1</a>
        </div>
      </section>
    </main>

    <script type="module">
      import { createHankoSvg, svgToDataUri } from "./hanko.js";

      const urlInput = document.getElementById("urlInput");
      const textInput = document.getElementById("textInput");
      const shapeInput = document.getElementById("shapeInput");
      const styleInput = document.getElementById("styleInput");
      const generateBtn = document.getElementById("generateBtn");
      const downloadBtn = document.getElementById("downloadBtn");
      const sampleBtn = document.getElementById("sampleBtn");
      const statusEl = document.getElementById("status");
      const previewNote = document.getElementById("previewNote");
      const canvas = document.getElementById("preview");
      const ctx = canvas.getContext("2d");

      const sample = {
        url: "https://example.com",
        text: "高橋",
        shape: "circle",
        style: "standard",
      };

      function normalizeUrl(value) {
        const trimmed = value.trim();
        if (!trimmed) return "";
        if (/^[a-zA-Z][a-zA-Z\d+\-.]*:\/\//.test(trimmed)) {
          return trimmed;
        }
        return `https://${trimmed}`;
      }

      function loadImage(src) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = () => reject(new Error("SVG image load failed"));
          image.src = src;
        });
      }

      function drawSealBackdrop(context, size, shape) {
        context.beginPath();
        if (shape === "square") {
          const radius = Math.max(10, size * 0.14);
          const inset = size * 0.02;
          const x = -size / 2 + inset;
          const y = -size / 2 + inset;
          const width = size - inset * 2;
          const height = size - inset * 2;
          const r = Math.min(radius, width / 2, height / 2);
          context.moveTo(x + r, y);
          context.arcTo(x + width, y, x + width, y + height, r);
          context.arcTo(x + width, y + height, x, y + height, r);
          context.arcTo(x, y + height, x, y, r);
          context.arcTo(x, y, x + width, y, r);
          context.closePath();
        } else {
          context.arc(0, 0, size * 0.5, 0, Math.PI * 2);
        }
        context.fillStyle = "#fffdf8";
        context.fill();
      }

      function getQrSettings(text) {
        const style = styleInput.value;
        const stampRatio =
          style === "bold" ? 0.47 : style === "compact" ? 0.39 : 0.43;

        return {
          stampRatio,
          text: text.trim() || "印",
        };
      }

      function drawQrCode(context, url, size) {
        const qr = qrcode(0, "H");
        qr.addData(url);
        qr.make();

        const count = qr.getModuleCount();
        const quietZone = Math.floor(size * 0.08);
        const usable = size - quietZone * 2;
        const moduleSize = Math.floor(usable / count);
        const actualSize = moduleSize * count;
        const offset = Math.floor((size - actualSize) / 2);

        context.clearRect(0, 0, size, size);
        context.fillStyle = "#fffdf8";
        context.fillRect(0, 0, size, size);
        context.fillStyle = "#b5442b";

        for (let row = 0; row < count; row += 1) {
          for (let col = 0; col < count; col += 1) {
            if (qr.isDark(row, col)) {
              context.fillRect(
                offset + col * moduleSize,
                offset + row * moduleSize,
                moduleSize,
                moduleSize,
              );
            }
          }
        }

        return {
          count,
          moduleSize,
          offset,
          actualSize,
          quietZone,
        };
      }

      async function render() {
        const rawUrl = urlInput.value;
        const normalizedUrl = normalizeUrl(rawUrl);
        const hankoText = textInput.value.trim();

        if (!normalizedUrl) {
          statusEl.textContent = "URLを入れてください。";
          previewNote.textContent = "URLが空だとQRコードを作れません。";
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          return;
        }

        if (typeof qrcode !== "function") {
          statusEl.textContent = "QRライブラリを読み込み中です。";
          return;
        }

        const settings = getQrSettings(hankoText || "印");

        try {
          drawQrCode(ctx, normalizedUrl, canvas.width);

          const sealSize = Math.round(canvas.width * settings.stampRatio);
          const sealSvg = createHankoSvg({
            text: settings.text,
            shape: shapeInput.value === "square" ? "square" : "circle",
            color: "#b5442b",
            transparent: true,
          });
          const sealImage = await loadImage(svgToDataUri(sealSvg));

          const centerX = canvas.width / 2;
          const centerY = canvas.height / 2;

          ctx.save();
          ctx.translate(centerX, centerY);

          ctx.shadowColor = "rgba(31, 26, 23, 0.15)";
          ctx.shadowBlur = 20;
          ctx.shadowOffsetY = 8;
          drawSealBackdrop(ctx, sealSize, shapeInput.value === "square" ? "square" : "circle");

          ctx.shadowColor = "transparent";
          ctx.drawImage(sealImage, -sealSize / 2, -sealSize / 2, sealSize, sealSize);
          ctx.restore();

          statusEl.textContent = `生成しました。${normalizedUrl}`;
          previewNote.textContent =
            "印影は SVG で作っているので、輪郭やかすれを少しきれいに制御できるようになっています。";
        } catch (error) {
          console.error(error);
          statusEl.textContent = "生成に失敗しました。URLか入力文字を見直してください。";
          previewNote.textContent = "うまく作れなかったので、入力を少し変えて再試行してください。";
        }
      }

      async function downloadPng() {
        const rawUrl = urlInput.value;
        const normalizedUrl = normalizeUrl(rawUrl);

        if (!normalizedUrl) {
          statusEl.textContent = "先にQRを生成してください。";
          return;
        }

        await render();

        const link = document.createElement("a");
        const stampText = (textInput.value.trim() || "印").replace(/[^\wぁ-んァ-ヶ一-龠]/g, "");
        link.download = `qr-hanko-${stampText || "seal"}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
      }

      function restoreSample() {
        urlInput.value = sample.url;
        textInput.value = sample.text;
        shapeInput.value = sample.shape;
        styleInput.value = sample.style;
        render();
      }

      let renderTimer = 0;
      function scheduleRender() {
        window.clearTimeout(renderTimer);
        renderTimer = window.setTimeout(render, 180);
      }

      generateBtn.addEventListener("click", render);
      downloadBtn.addEventListener("click", downloadPng);
      sampleBtn.addEventListener("click", restoreSample);
      urlInput.addEventListener("input", scheduleRender);
      textInput.addEventListener("input", scheduleRender);
      shapeInput.addEventListener("change", render);
      styleInput.addEventListener("change", render);

      window.addEventListener("load", () => {
        render();
      });
    </script>
  </body>
</html>
